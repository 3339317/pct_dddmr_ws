function connectWS(){
    try{
    const protocol = location.protocol === "https:" ? "wss" : "ws";
    const wsUrl = `${protocol}://${location.host}/ws/status`;
    console.log("[WS] connecting to:", wsUrl);
    ui.ws = new WebSocket(wsUrl);
    ui._ws_msg_seq = 0;
    ui._ws_open = true;

    ui.ws.onopen = ()=>{
        console.log("[WS] connected");
        ui._ws_open = true;
    };
    ui.ws.onclose = ()=>{
        console.log("[WS] closed, will reconnect in 2s");
        ui._ws_open = false;
        setTimeout(connectWS, 2000);
    };
    ui.ws.onerror = (e)=>{
        console.log("[WS] error", e);
    };

    ui.ws.onmessage = async (ev)=>{
        try{
            const d = JSON.parse(ev.data);
            if(d.type === "compact_state"){
                ui._ws_msg_seq = (ui._ws_msg_seq || 0) + 1;
                if(ui._ws_msg_seq === 1 || ui._ws_msg_seq % 50 === 1){
                    const cp = d.current_pose;
                    console.log("[WS #"+ui._ws_msg_seq+"] pose:", cp ? `x=${cp.x?.toFixed(2)} y=${cp.y?.toFixed(2)} z=${cp.z?.toFixed(2)} yaw_deg=${cp.yaw_deg?.toFixed(1)}` : "NULL");
                }

                const oldRev = {...ui.revisions};

                if(!ui.state) ui.state = {};
                ui.state.status_text = d.status_text;
                ui.state.localized = d.localized;
                ui.state.current_pose = d.current_pose;
                ui.state.current_vx = d.current_vx;
                ui.state.current_wz = d.current_wz;
                ui.state.nav = d.nav || {};
                ui.state.camera = d.camera || {};
                ui.state.pcd_path = d.pcd_path || "";
                ui.state.topics = d.topics || {};
                ui.state.route_polyline = d.route_polyline || [];
                ui.state.route_count = d.route_count;
                ui.state.revisions = d.revisions || {map:0, route:0};

                try {
                    updateInfo();
                } catch(e2) { console.error("[WS] updateInfo error:", e2); }
                try {
                    scheduleRender();
                } catch(e2) { console.error("[WS] render error:", e2); }

                const newRev = getRevisions(d);
                const changed =
                    newRev.map !== oldRev.map ||
                    newRev.route !== oldRev.route ||
                    newRev.area !== oldRev.area;

                ui.revisions = newRev;

                const mapOrAreaChanged = newRev.map !== oldRev.map || newRev.area !== oldRev.area;
                if(changed && mapOrAreaChanged && !ui.fullRefreshBusy){
                    await refreshState(false);
                }
            }else{
                ui.state = d;
                ui.revisions = getRevisions(d);
                try {
                    syncInputs(false);
                    updateInfo();
                    scheduleRender();
                } catch(e2) { console.error("[WS] render error:", e2); }
            }
        }catch(e){ console.error("[WS] message error:", e); }
    };

    ui.ws.onclose = ()=>setTimeout(connectWS, 3000);
    }catch(e){console.error("[WS] connect error:",e);}
}

function resizeCanvas(){
    const rect = wrap.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    scheduleRender();
}

canvas.addEventListener("contextmenu", e=>e.preventDefault());

canvas.addEventListener("mousedown", (e)=>{
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;

    ui.drag.lastX = sx;
    ui.drag.lastY = sy;
    ui.drag.moved = false;

    if(e.button === 2){ // 右键用于旋转视图
        ui.drag.rotating = true;
        return;
    }

    if(e.button === 1){ // 中键用于平移视图
        ui.drag.panning = true;
        return;
    }

    if(e.button === 0 && ui.mode === "none"){ // 左键仅在空闲模式旋转
        ui.drag.rotating = true;
    }
});

canvas.addEventListener("mousemove", (e)=>{
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;

    const dx = sx - ui.drag.lastX;
    const dy = sy - ui.drag.lastY;

    if(ui.drag.panning){
        if(Math.abs(dx) > 0 || Math.abs(dy) > 0) ui.drag.moved = true;
        ui.view.offsetX += dx;
        ui.view.offsetY += dy;
        ui.drag.lastX = sx;
        ui.drag.lastY = sy;
        scheduleRender();
        return;
    }

    if(ui.drag.rotating){
        if(Math.abs(dx) > 0 || Math.abs(dy) > 0) ui.drag.moved = true;
        ui.view.yaw += dx * 0.008;
        ui.view.pitch += dy * 0.006;
        ui.view.pitch = Math.max(-1.45, Math.min(1.45, ui.view.pitch));
        ui.drag.lastX = sx;
        ui.drag.lastY = sy;
        scheduleRender();
        return;
    }

    // 预览鼠标点
    if(ui.mode === "draw_route" && ui.drawingRoutePoints.length > 0){
        ui.hoverWorld = getDrawRouteHoverPoint(sx, sy);
        scheduleRender();
    }else if(ui.mode === "plan_goal"){
        ui.hoverWorld = getPlanningPointFromCanvas(sx, sy);
        scheduleRender();
    }else if(ui.mode === "set_initial_pose" && ui.pendingInitialPose){
        ui.hoverWorld = getPlanningPointFromCanvas(sx, sy);
        scheduleRender();
    }else if(ui.mode === "edit_route_z"){
        // 检查鼠标是否悬停在某个点上
        const hoverIdx = findNearestDrawingRoutePointProjected(sx, sy, 24);
        const prevHoverIdx = findNearestDrawingRoutePointProjected(ui.drag.lastX, ui.drag.lastY, 24);
        if(hoverIdx !== prevHoverIdx){
            // 悬停状态改变，重新渲染
            scheduleRender();
        }
    }else if(ui.mode === "delete_route_segment"){
        const idx = findNearestRouteIndexProjected(sx, sy, 18);
        if(idx !== ui.hoverRouteIdx){
            ui.hoverRouteIdx = idx;
            scheduleRender();
        }
    }
});

window.addEventListener("mouseup", ()=>{
    ui.drag.panning = false;
    ui.drag.rotating = false;
});

// 键盘事件监听：左右箭头旋转视图，上下左右箭头修改点位坐标
window.addEventListener("keydown", (e)=>{
    if(ui.isEditingParam) return; // 如果在参数输入框中，不处理快捷键

    const step = 0.05; // 坐标调整步长（单位：米）
    const rotateStep = 0.1; // 旋转步长

    switch(e.key){
        case "ArrowLeft":
            e.preventDefault();
            if(ui.mode === "edit_route_z" && ui.pendingRouteZIdx !== null){
                // 编辑模式下：左键减少 X 坐标
                const p = ui.drawingRoutePoints[ui.pendingRouteZIdx];
                p.x -= step;
                updateRouteEditPanel();
                scheduleRender();
            }else{
                // 其他模式：旋转视图
                ui.view.yaw -= rotateStep;
                scheduleRender();
            }
            break;

        case "ArrowRight":
            e.preventDefault();
            if(ui.mode === "edit_route_z" && ui.pendingRouteZIdx !== null){
                // 编辑模式下：右键增加 X 坐标
                const p = ui.drawingRoutePoints[ui.pendingRouteZIdx];
                p.x += step;
                updateRouteEditPanel();
                scheduleRender();
            }else{
                // 其他模式：旋转视图
                ui.view.yaw += rotateStep;
                scheduleRender();
            }
            break;

        case "ArrowUp":
            e.preventDefault();
            if(ui.mode === "edit_route_z" && ui.pendingRouteZIdx !== null){
                // 编辑模式下：上键增加 Y 坐标
                const p = ui.drawingRoutePoints[ui.pendingRouteZIdx];
                p.y += step;
                updateRouteEditPanel();
                scheduleRender();
            }
            break;

        case "ArrowDown":
            e.preventDefault();
            if(ui.mode === "edit_route_z" && ui.pendingRouteZIdx !== null){
                // 编辑模式下：下键减少 Y 坐标
                const p = ui.drawingRoutePoints[ui.pendingRouteZIdx];
                p.y -= step;
                updateRouteEditPanel();
                scheduleRender();
            }
            break;
    }
});

canvas.addEventListener("wheel", (e)=>{
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 0.89;
    ui.view.scale *= factor;
    ui.view.scale = Math.max(2.0, Math.min(1000, ui.view.scale));
    scheduleRender();
}, {passive:false});

canvas.addEventListener("click", async (e)=>{
    if(!ui.state) return;
    if(ui.drag.moved) return;

    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;

    if(ui.mode === "delete_route_segment"){
        const idx = findNearestRouteIndexProjected(sx, sy, 18);
        if(idx === null){
            alert("未找到附近路线，请点击绿色路线");
            return;
        }

        if(ui.pendingDeleteRouteIdx === null){
            ui.pendingDeleteRouteIdx = idx;
            ui.hoverRouteIdx = idx;
            setStatus(`已选择删除区间起点：第 ${idx + 1} 个路线点，请点击终点`);
            updateModeHint();
            scheduleRender();
        }else{
            await deleteRouteRange(ui.pendingDeleteRouteIdx, idx);
        }
        return;
    }

    if(ui.mode === "plan_goal"){
        const goal = getPlanningPointFromCanvas(sx, sy);
        if(!goal){
            alert("无法获取目标点坐标");
            return;
        }
        if(ui.pendingPlanGoal === null){
            ui.pendingPlanGoal = {x: goal.x, y: goal.y, z: goal.z};
            ui.hoverWorld = goal;
            setStatus("已选中目标位置，请第二次点击设置终点朝向");
            updateModeHint();
            scheduleRender();
            return;
        }

        const yawDist = Math.hypot(
            goal.y - ui.pendingPlanGoal.y,
            goal.x - ui.pendingPlanGoal.x
        );
        if(yawDist < 0.05){
            alert("朝向点离终点太近，请在终点前方稍远处再点一次");
            return;
        }

        const yaw = Math.atan2(
            goal.y - ui.pendingPlanGoal.y,
            goal.x - ui.pendingPlanGoal.x
        ) * 180 / Math.PI;

        try {
            const d = await api("/api/nav/set-goal", "POST", {
                x: ui.pendingPlanGoal.x,
                y: ui.pendingPlanGoal.y,
                z: ui.pendingPlanGoal.z,
                yaw_deg: yaw
            });
            if(d.ok){
                setStatus(d.message || "已发送导航目标");
            } else {
                alert(d.message || "设置目标失败");
            }
        } catch(e) {
            alert("设置目标失败: " + e.message);
        }

        ui.pendingPlanGoal = null;
        ui.hoverWorld = null;
        ui.mode = "none";
        updateModeHint();
        scheduleRender();
        return;
    }

    if(ui.mode === "set_initial_pose"){
        const pt = getPlanningPointFromCanvas(sx, sy);
        if(!pt){
            alert("无法获取坐标");
            return;
        }
        if(ui.pendingInitialPose === null){
            ui.pendingInitialPose = {x: pt.x, y: pt.y, z: pt.z};
            ui.hoverWorld = pt;
            setStatus("已选中位置，请第二次点击设置朝向（发布/initialpose）");
            updateModeHint();
            scheduleRender();
            return;
        }

        const yawDist = Math.hypot(
            pt.y - ui.pendingInitialPose.y,
            pt.x - ui.pendingInitialPose.x
        );
        if(yawDist < 0.05){
            alert("朝向点离位置太近，请在位置前方稍远处再点一次");
            return;
        }

        const yaw = Math.atan2(
            pt.y - ui.pendingInitialPose.y,
            pt.x - ui.pendingInitialPose.x
        ) * 180 / Math.PI;

        await publishInitialPose(
            ui.pendingInitialPose.x,
            ui.pendingInitialPose.y,
            ui.pendingInitialPose.z,
            yaw
        );
        return;
    }

    if(ui.mode === "draw_route" || ui.mode === "draw_curve"){
        const picked = pickNearestPointCloudPoint(sx, sy);
        if(picked){
            ui.drawingRoutePoints.push({x: picked.x, y: picked.y, z: picked.z});
        }else{
            const fallback = screenToWorldOnPlane(sx, sy, getDefaultDrawPlaneZ());
            if(fallback){
                ui.drawingRoutePoints.push({x: fallback.x, y: fallback.y, z: fallback.z});
            }else{
                alert("无法获取坐标");
                return;
            }
        }
        const label = ui.mode === "draw_curve" ? "曲线点" : "路线点";
        setStatus(`已添加${label}，当前 ${ui.drawingRoutePoints.length} 个点`);
        updateModeHint();
        scheduleRender();
        return;
    }

    if(ui.mode === "edit_route_z"){
        const idx = findNearestDrawingRoutePointProjected(sx, sy, 16);
        if(idx === null){
            alert("未找到附近路线点，请点击已添加的点");
            return;
        }

        const picked = pickNearestPointCloudPoint(sx, sy, 30);
        if(picked){
            setDrawingRoutePointZ(idx, picked.z);
            setStatus(`已将第 ${idx + 1} 个点高度设置为附近点云高度 ${picked.z.toFixed(3)}`);
            updateModeHint();
            return;
        }

        const cur = ui.drawingRoutePoints[idx];
        const newZ = prompt(`未找到附近点云，设置第 ${idx + 1} 个点的高度 Z（当前 ${cur.z.toFixed(2)}）:`, cur.z.toFixed(2));
        if(newZ === null) return;
        const zVal = parseFloat(newZ);
        if(Number.isNaN(zVal)){
            alert("请输入有效的数值");
            return;
        }
        setDrawingRoutePointZ(idx, zVal);
        setStatus(`已设置第 ${idx + 1} 个点高度为 ${zVal.toFixed(2)}`);
        updateModeHint();
        return;
    }
});

function bindFileInput(id, handler){
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener("change", async e=>{
        const f = e.target.files[0];
        if(f) await handler(f);
        e.target.value = "";
    });
}

bindFileInput("paramsCfgFileInput", loadParamsConfigFile);

document.addEventListener("click", async (e)=>{
    const deleteBtn = e.target.closest("[data-delete-area-index]");
    if(deleteBtn){
        e.preventDefault();
        e.stopPropagation();
        const idx = parseInt(deleteBtn.dataset.deleteAreaIndex, 10);
        await deleteDrivableAreaByIndex(idx);
        return;
    }

    const actionBtn = e.target.closest("[data-action]");
    if(!actionBtn) return;
    const action = actionBtn.dataset.action;
    if(!action) return;

    e.preventDefault();
    e.stopPropagation();

    if(action === "delete-selected-area"){
        setStatus("已点击删除选中区域");
    }
}, true);

window.addEventListener("error", (e)=>{
    setStatus("网页脚本错误: " + (e.message || "unknown"));
});

window.addEventListener("resize", resizeCanvas);

window.onload = async ()=>{
    document.querySelectorAll(".param-input").forEach(el=>{
        el.addEventListener("focus", ()=>{ ui.isEditingParam = true; });
        el.addEventListener("blur", ()=>{ ui.isEditingParam = false; });
    });

    const zSlider = document.getElementById("routeEditZ");
    const zValue = document.getElementById("routeEditZValue");
    if(zSlider){
        zSlider.addEventListener("input", ()=>onRouteEditZInput(zSlider.value));
    }
    if(zValue){
        zValue.addEventListener("change", ()=>onRouteEditZInput(zValue.value));
    }

    const zFilterEnabled = document.getElementById("zFilterEnabled");
    const zFilterMin = document.getElementById("zFilterMin");
    const zFilterMax = document.getElementById("zFilterMax");
    if(zFilterEnabled){
        zFilterEnabled.addEventListener("change", applyZFilterInputs);
    }
    [zFilterMin, zFilterMax].forEach(el=>{
        if(!el) return;
        el.addEventListener("focus", ()=>{ ui.isEditingParam = true; });
        el.addEventListener("blur", ()=>{ ui.isEditingParam = false; });
        el.addEventListener("change", applyZFilterInputs);
    });

    resizeCanvas();
    updateModeHint();
    connectWS();
    try { updateRouteEditPanel(); } catch(e) {}
    await refreshState(true);
};
</script>
