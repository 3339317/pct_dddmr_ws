<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ROS2 Web 3D Route Nav</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%2300aacc'/><text x='16' y='22' font-size='20' text-anchor='middle' fill='white'>R</text></svg>">
<style>
:root{
    --bg-deep:#070c18;
    --bg-panel:#0a1222;
    --bg-card:#0d1728;
    --border:#1a2e50;
    --border-focus:#2979b5;
    --accent:#0ac;
    --accent-dim:rgba(0,170,204,0.12);
    --green:#0ce676;
    --green-dim:rgba(12,230,118,0.14);
    --red:#ff3b5c;
    --red-dim:rgba(255,59,92,0.14);
    --amber:#f0a020;
    --amber-dim:rgba(240,160,32,0.14);
    --blue:#2980cc;
    --blue-dim:rgba(41,128,204,0.14);
    --text:#c4d0e0;
    --text-dim:#5e6d82;
    --radius:10px;
    --radius-sm:6px;
    --transition:0.2s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{
    font-family:"Segoe UI","Helvetica Neue","Noto Sans SC","PingFang SC",sans-serif;
    background:var(--bg-deep);
    color:var(--text);
}
body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
        linear-gradient(rgba(0,170,204,0.012) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,170,204,0.012) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;z-index:0;
}
.header{
    padding:6px 14px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,var(--bg-panel),var(--bg-deep));
    position:relative;z-index:1;
    display:flex;align-items:center;gap:16px;
}
.header b{font-size:15px;color:var(--accent);letter-spacing:1px}
.main{
    display:grid;
    grid-template-columns:340px 1fr 280px;
    gap:10px;padding:10px;
    height:calc(100% - 44px);
    position:relative;z-index:1;
}
.panel{
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:linear-gradient(160deg,var(--bg-panel),var(--bg-deep));
    display:flex;flex-direction:column;min-height:0;
    backdrop-filter:blur(8px);
}
.panel h3{
    margin:0;padding:10px 14px;
    border-bottom:1px solid var(--border);
    font-size:14px;font-weight:600;
    color:var(--accent);letter-spacing:1px;
    background:linear-gradient(180deg,rgba(0,170,204,0.06),transparent);
}
.panel-body{padding:10px;overflow:auto;flex:1}
.panel-body::-webkit-scrollbar{width:5px}
.panel-body::-webkit-scrollbar-track{background:transparent}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.panel-body::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}
.btn{
    padding:7px 14px;border:none;border-radius:var(--radius-sm);
    cursor:pointer;color:#fff;margin:3px;font-size:12px;
    font-weight:500;letter-spacing:0.3px;
    transition:transform var(--transition),box-shadow var(--transition),filter var(--transition);
    position:relative;
}
.btn:hover{transform:translateY(-1px);filter:brightness(1.15)}
.btn:active{transform:translateY(0);filter:brightness(0.95)}
.green{background:linear-gradient(135deg,#0caa46,#0ce676);box-shadow:0 2px 10px var(--green-dim)}
.green:hover{box-shadow:0 4px 18px var(--green-dim)}
.blue{background:linear-gradient(135deg,#2070b0,#2980cc);box-shadow:0 2px 10px var(--blue-dim)}
.blue:hover{box-shadow:0 4px 18px var(--blue-dim)}
.gray{background:linear-gradient(135deg,#3a4a60,#4a5c78);box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.red{background:linear-gradient(135deg,#d6283c,#ff3b5c);box-shadow:0 2px 10px var(--red-dim)}
.red:hover{box-shadow:0 4px 18px var(--red-dim)}
.orange{background:linear-gradient(135deg,#d08810,#f0a020);color:#111;box-shadow:0 2px 10px var(--amber-dim)}
.orange:hover{box-shadow:0 4px 18px var(--amber-dim)}
.row{margin-bottom:8px}
.row label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;font-weight:500;letter-spacing:0.2px}
.row input{
    width:100%;padding:8px 10px;border-radius:var(--radius-sm);
    border:1px solid var(--border);background:var(--bg-deep);
    color:var(--text);font-size:12px;
    transition:border-color var(--transition),box-shadow var(--transition);
}
.row input:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-dim)}
.row input[type="checkbox"]{width:auto;margin-right:6px;accent-color:var(--accent)}
#mapCanvas{width:100%;height:100%;display:block;background:#060d1a;border-radius:var(--radius)}
.canvas-wrap{
    position:relative;height:100%;min-height:620px;
    border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,170,204,0.06),inset 0 0 80px rgba(0,0,0,0.5);
}
.canvas-wrap::before{
    content:"";position:absolute;inset:0;
    border-radius:var(--radius);
    box-shadow:inset 0 0 1px rgba(0,170,204,0.15);
    pointer-events:none;z-index:2;
}
.canvas-wrap::after{
    content:"";position:absolute;
    top:10px;left:10px;width:22px;height:22px;
    border-top:2px solid var(--accent);border-left:2px solid var(--accent);
    border-radius:3px 0 0 0;pointer-events:none;z-index:2;opacity:0.5;
}
.small{font-size:11px;color:var(--text-dim);line-height:1.7}
pre{white-space:pre-wrap;word-break:break-word}
.toolbar{display:flex;flex-wrap:wrap;gap:6px}
.tool-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;margin-bottom:10px}
.tab-btn{
    padding:7px 6px;border:1px solid var(--border);
    border-radius:var(--radius-sm);background:var(--bg-deep);
    color:var(--text-dim);cursor:pointer;font-size:11px;font-weight:500;
    transition:all var(--transition);
}
.tab-btn:hover{color:var(--text);border-color:var(--border-focus)}
.tab-btn.active{
    background:linear-gradient(135deg,#1a4070,#2070a0);
    color:#fff;border-color:var(--accent);
    box-shadow:0 0 12px var(--accent-dim);
}
.tool-page{display:none}
.tool-page.active{display:block}
.status{color:var(--accent);font-weight:bold}
.tip{
    position:absolute;
    left:10px;top:10px;
    background:rgba(7,12,24,0.85);
    backdrop-filter:blur(6px);
    padding:6px 12px;
    border-radius:var(--radius-sm);
    font-size:11px;color:var(--text);
    z-index:5;max-width:520px;
    border:1px solid var(--border);
}
.section-title{
    margin-top:10px;color:var(--accent);font-size:12px;
    font-weight:600;letter-spacing:1px;text-transform:uppercase;
}
.mode-box{
    margin-top:8px;padding:8px 10px;
    border:1px solid var(--border);border-radius:var(--radius-sm);
    background:var(--bg-deep);font-size:11px;line-height:1.7;
}
.direction-pad{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:auto auto auto;
    gap:4px;margin-top:10px;padding:8px;
    border:1px solid var(--border);border-radius:var(--radius);
    background:var(--bg-deep);
    justify-items:center;align-items:center;
}
.dir-btn{
    width:66px;height:56px;
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    background:linear-gradient(160deg,var(--bg-card),var(--bg-deep));
    color:#c0ccdd;cursor:pointer;
    font-size:11px;line-height:1.3;
    user-select:none;-webkit-user-select:none;
    transition:all var(--transition);
}
.dir-btn:hover{border-color:var(--border-focus);color:#fff}
.dir-btn:active,.dir-btn.active{
    background:linear-gradient(135deg,#1a4070,#2070a0);
    border-color:var(--accent);color:#fff;
    box-shadow:0 0 14px var(--accent-dim);
}
.dir-stop{
    width:66px;height:56px;
    background:linear-gradient(135deg,#991b1b,#c0283c);
    border-color:#ef4454;color:#fff;
    font-weight:bold;font-size:13px;
    transition:all var(--transition);
}
.dir-stop:hover{filter:brightness(1.2);box-shadow:0 0 14px var(--red-dim)}
.dir-stop:active{filter:brightness(0.9)}
@keyframes breathe{
    0%,100%{opacity:0.4;box-shadow:0 0 4px var(--accent-dim)}
    50%{opacity:1;box-shadow:0 0 12px var(--accent-dim)}
}
@keyframes warnPulse{
    0%,100%{border-color:var(--border)}
    50%{border-color:var(--red)}
}
.status-dot{
    display:inline-block;width:8px;height:8px;
    border-radius:50%;margin-right:6px;
    vertical-align:middle;
}
.status-dot.online{background:var(--green);animation:breathe 2s ease-in-out infinite}
.status-dot.offline{background:var(--red);animation:breathe 1s ease-in-out infinite}
@media(max-width:1350px){.main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
    <div><b>ROS2 室内导航控制台</b></div>
    <div class="small" id="topStatus"><span class="status-dot online"></span>状态：等待操作</div>
</div>

<div class="main">
    <div class="panel">
        <h3>操作 / 参数</h3>
        <div class="panel-body">

            <div class="tool-tabs">
                <button class="tab-btn active" data-tool-page="nav" onclick="showToolPage('nav')">导航</button>
                <button class="tab-btn" data-tool-page="chassis" onclick="showToolPage('chassis')">底盘</button>
                <button class="tab-btn" data-tool-page="params" onclick="showToolPage('params')">参数</button>
            </div>

            <div class="mode-box">
                <div id="modeText"><b>当前模式：none</b></div>
                <div id="modeHint">提示：请选择一个模式。</div>
            </div>

            <div class="tool-page active" id="toolPageNav">
                <div class="section-title">导航 / 系统</div>
                <div class="toolbar">
                    <button class="btn orange" onclick="setMode('plan_goal')">🎯 点击规划</button>
                    <button class="btn orange" onclick="startNavigation()">开始导航</button>
                    <button class="btn gray" onclick="stopNavigation()">停止导航</button>
                    <button class="btn red" onclick="emergencyStop()">紧急停止</button>
                    <button class="btn blue" onclick="setMode('set_initial_pose')">📍 手动定位</button>
                </div>

                <div class="toolbar">
                    <button class="btn blue" onclick="openRosImage()">显示图像</button>
                    <button class="btn gray" onclick="closeRosImage()">关闭图像</button>
                    <button class="btn red" onclick="shutdownProgram()">关闭程序</button>
                </div>

                <div class="section-title">高度层筛选 / 选点辅助</div>
                <div class="row">
                    <label><input id="zFilterEnabled" type="checkbox"> 只显示并选取当前高度层</label>
                </div>
                <div class="row">
                    <label>Z 最小 / 最大 (m)</label>
                    <div style="display:flex;gap:6px">
                        <input class="param-input" id="zFilterMin" type="number" step="0.05" style="width:50%">
                        <input class="param-input" id="zFilterMax" type="number" step="0.05" style="width:50%">
                    </div>
                </div>
                <div class="toolbar">
                    <button class="btn gray" onclick="setZFilterAroundCurrentPose()">跟随当前楼层</button>
                    <button class="btn gray" onclick="nudgeZFilter(1)">上一层</button>
                    <button class="btn gray" onclick="nudgeZFilter(-1)">下一层</button>
                    <button class="btn gray" onclick="useFullZRange()">全部高度</button>
                </div>
                <div class="small" id="zFilterInfo">点云高度范围: -</div>
            </div>

            <div class="tool-page" id="toolPageChassis">
                <div class="section-title">模式切换</div>
                <div class="toolbar">
                    <button class="btn green" onclick="chassisSetMode('stand')">站立</button>
                    <button class="btn blue" onclick="chassisSetMode('walk')">行走</button>
                    <button class="btn orange" id="btnStairToggle" onclick="chassisToggleStair()">楼梯: 关</button>
                    <button class="btn gray" onclick="chassisSitdown()">蹲下</button>
                </div>

                <div class="section-title">速度控制</div>
                <div class="row">
                    <label>线速度 <span id="chassisSpeedLabel">0.40</span> m/s</label>
                    <input id="chassisSpeedSlider" type="range" min="0.05" max="1.50" step="0.05" value="0.40" oninput="chassisSpeedChanged()">
                </div>
                <div class="row">
                    <label>角速度 <span id="chassisTurnSpeedLabel">0.50</span> rad/s</label>
                    <input id="chassisTurnSpeedSlider" type="range" min="0.10" max="2.00" step="0.05" value="0.50" oninput="chassisTurnSpeedChanged()">
                </div>

                <div class="direction-pad">
                    <button class="dir-btn" id="dirFwd"     data-vx="+1" data-vy="0" data-vz="0"  onmousedown="startDirMove(this)" onmouseup="stopDirMove()" onmouseleave="stopDirMove()" ontouchstart="startDirMove(this)" ontouchend="stopDirMove()">▲<br>前进</button>
                    <button class="dir-btn" id="dirTurnL"   data-vx="0" data-vy="0" data-vz="+1" onmousedown="startDirMove(this)" onmouseup="stopDirMove()" onmouseleave="stopDirMove()" ontouchstart="startDirMove(this)" ontouchend="stopDirMove()">↺<br>左转</button>
                    <button class="dir-btn dir-stop" id="dirStop" onclick="chassisStop()">STOP</button>
                    <button class="dir-btn" id="dirTurnR"   data-vx="0" data-vy="0" data-vz="-1" onmousedown="startDirMove(this)" onmouseup="stopDirMove()" onmouseleave="stopDirMove()" ontouchstart="startDirMove(this)" ontouchend="stopDirMove()">↻<br>右转</button>
                    <button class="dir-btn" id="dirBack"    data-vx="-1" data-vy="0" data-vz="0"  onmousedown="startDirMove(this)" onmouseup="stopDirMove()" onmouseleave="stopDirMove()" ontouchstart="startDirMove(this)" ontouchend="stopDirMove()">▼<br>后退</button>
                    <button class="dir-btn" id="dirLeft"    data-vx="0" data-vy="+1" data-vz="0"  onmousedown="startDirMove(this)" onmouseup="stopDirMove()" onmouseleave="stopDirMove()" ontouchstart="startDirMove(this)" ontouchend="stopDirMove()">◄<br>左移</button>
                    <button class="dir-btn" id="dirRight"   data-vx="0" data-vy="-1" data-vz="0"  onmousedown="startDirMove(this)" onmouseup="stopDirMove()" onmouseleave="stopDirMove()" ontouchstart="startDirMove(this)" ontouchend="stopDirMove()">►<br>右移</button>
                </div>

                <div class="section-title">安全 / 传感器</div>
                <div class="toolbar">
                    <button class="btn red" onclick="chassisEmgyStop()">⚠ 紧急停止</button>
                    <button class="btn blue" id="btnImuToggle" onclick="chassisToggleImu()">IMU: 关</button>
                </div>
            </div>
            <div class="tool-page" id="toolPageParams">
                <div class="toolbar">
                    <button class="btn blue" onclick="saveParamsConfig()">保存为默认参数</button>
                    <button class="btn green" onclick="applyAndSaveParams()">应用并保存</button>
                    <span class="small" id="defaultParamsPathText">默认参数文件: -</span>
                </div>

                <div class="section-title">速度控制</div>
                <div class="row"><label>最大线速度 (m/s)</label><input class="param-input" id="max_vx" type="number" step="any"></div>
                <div class="row"><label>最大角速度 (rad/s)</label><input class="param-input" id="max_wz" type="number" step="any"></div>
                <div class="row"><label>最小线速度 (m/s)</label><input class="param-input" id="min_vx" type="number" step="any"></div>
                <div class="row"><label>最小角速度 (rad/s)</label><input class="param-input" id="min_wz" type="number" step="any"></div>
                <div class="row"><label>速度平滑系数</label><input class="param-input" id="alpha" type="number" step="any"></div>
                <div class="row"><label>前视距离 (m)</label><input class="param-input" id="lookahead_distance" type="number" step="any"></div>

                <div class="section-title">路径跟踪</div>
                <div class="row"><label>路径转向增益</label><input class="param-input" id="path_yaw_kp" type="number" step="any"></div>
                <div class="row"><label>到点距离阈值 (m)</label><input class="param-input" id="arrival_dist" type="number" step="any"></div>
                <div class="row"><label>到点角度阈值 (°)</label><input class="param-input" id="arrival_angle" type="number" step="any"></div>
                <div class="row"><label>终点朝向增益</label><input class="param-input" id="final_yaw_kp" type="number" step="any"></div>
                <div class="row"><label>终点减速距离 (m)</label><input class="param-input" id="end_slowdown_distance" type="number" step="any"></div>
                <div class="row"><label>大偏角限速角 (°)</label><input class="param-input" id="heading_slow_angle_deg" type="number" step="any"></div>

                <button class="btn green" onclick="applyControlParams()">应用控制参数</button>

                <div class="section-title">路径采样参数</div>
                <div class="row"><label>路径采样间距</label><input class="param-input" id="route_sample_gap" type="number" step="any"></div>
                <button class="btn green" onclick="applySmoothingParams()">应用路径采样参数</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <h3>3D 点云视图</h3>
        <div class="panel-body">
            <div class="toolbar">
                <button class="btn gray" onclick="fitView()">适配视图</button>
                <button class="btn gray" onclick="resetView()">重置视图</button>
                <button class="btn gray" onclick="togglePcdVisible()">显示/隐藏点云</button>
                <button class="btn gray" onclick="toggleRouteVisible()">显示/隐藏路线</button>
                <button class="btn gray" onclick="toggleRobotVisible()">显示/隐藏机器人</button>
                <button class="btn gray" onclick="refreshState()">刷新状态</button>
            </div>

            <div class="canvas-wrap" id="canvasWrap">
                <div class="tip" id="canvasTip">
                    提示：左键拖动旋转（当前模式为 none 时），右键拖动平移，滚轮缩放。
                </div>
                <canvas id="mapCanvas"></canvas>
            </div>
        </div>
    </div>

    <div class="panel">
        <h3>状态</h3>
        <div class="panel-body">
            <div class="status" id="statusText">等待操作</div>
            <div class="small" id="poseText">当前位置: X=--- Y=--- Z=--- Yaw=---</div>
            <div class="small" id="velText">当前速度: vx=0.00 wz=0.00</div>
            <div class="small" id="navText">导航阶段: -</div>
            <div class="small" id="lookaheadText">前视目标: -</div>
            <div class="small" id="cameraTopicText">图像话题: -</div>
            <hr>
            <div style="flex:1;min-height:150px;border:1px solid #23314a;border-radius:8px;overflow:hidden;margin-bottom:10px">
                <img id="cameraImg" style="width:100%;height:100%;object-fit:cover;background:black;">
            </div>
            <pre id="routeInfo"></pre>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("mapCanvas");
const wrap = document.getElementById("canvasWrap");
const ctx = canvas.getContext("2d");

const ui = {
    state: null,

    mode: "none",
    isEditingParam: false,

    showPcd: true,
    showRoute: true,
    showRobot: true,

    view: {
        scale: 40,
        yaw: -0.85,
        pitch: 0.55,
        offsetX: 0,
        offsetY: 0,
        centerX: 0,
        centerY: 0,
        centerZ: 0
    },

    drag: {
        panning: false,
        rotating: false,
        moved: false,
        lastX: 0,
        lastY: 0
    },

    pendingRouteZIdx: null,
    pendingDeleteRouteIdx: null,
    pendingPlanGoal: null,
    pendingInitialPose: null,
    hoverWorld: null,
    hoverRouteIdx: null,

    drawingRoutePoints: [],   // 手绘路线点
    committedRouteBlockCount: 0,  // 已提交的路线段起始点数（防止修改已确认部分）
    curveMode: false,
    curveSamplesPerSegment: 16,
    cachedZRange: {min: 0, max: 1, valid: false},  // 点云 Z 范围缓存
    useZFilter: false,
    activeZMin: 0.0,
    activeZMax: 1.0,
    zFilterWindow: 0.70,
    zFilterInitialized: false,
    routeEditMinZ: -5.0,
    routeEditMaxZ: 5.0,
    routeEditDragging: false,

    ws: null,
    fullRefreshBusy: false,
    revisions: {map:-1, route:-1, stop:-1},
    _pointsNormalized: null, _pointsRevision: 0,
    _mapLayersNormalized: {ground: [], inflation: [], obstacle: []},
    _mapAllPointsNormalized: [],
    _mapLayersRevision: "",
    _infoCache: {}
};
async function api(url, method="GET", data=null, isForm=false){
    const opt = {method};
    if(data){
        if(isForm){
            opt.body = data;
        }else{
            opt.headers = {"Content-Type":"application/json"};
            opt.body = JSON.stringify(data);
        }
    }
    const res = await fetch(url, opt);
    if(!res.ok) throw new Error("HTTP " + res.status);
    const ct = res.headers.get("content-type") || "";
    if(ct.includes("application/json")) return await res.json();
    return await res.text();
}

function showToolPage(name){
    document.querySelectorAll(".tool-page").forEach(el=>el.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active"));
    const page = document.getElementById("toolPage" + name.charAt(0).toUpperCase() + name.slice(1));
    if(page) page.classList.add("active");
    const btn = document.querySelector(`.tab-btn[data-tool-page="${name}"]`);
    if(btn) btn.classList.add("active");
}

function getRevisions(state){
    const r = (state && state.revisions) ? state.revisions : {};
    return {
        map: Number(r.map || 0),
        route: Number(r.route || 0)
    };
}

function setStatus(t){
    var cls=t&&t.indexOf('错')>=0?'offline':'online';
    document.getElementById("topStatus").innerHTML='<span class="status-dot '+cls+'"></span>状态：'+t;
    document.getElementById("statusText").innerText=t;
    document.getElementById("canvasTip").innerText="提示："+t;
}

function setBackendStatus(t){
    var cls=t&&t.indexOf('错')>=0?'offline':'online';
    document.getElementById("topStatus").innerHTML='<span class="status-dot '+cls+'"></span>状态：'+t;
    document.getElementById("statusText").innerText=t;
    if(ui.mode==="none"){
        document.getElementById("canvasTip").innerText="提示："+t;
    }
}

function setMode(mode){
    if(ui.mode === mode){
        cancelCurrentMode();
        return;
    }

    ui.mode = mode;
    resetPendingActions();

    if(mode === "draw_route" || mode === "draw_curve"){
        ui.curveMode = mode === "draw_curve";
        // 如果已有路线，自动加载为手绘基础（支持继续编辑）
        const existing = getRoutePoints();
        if(existing.length > 0 && ui.drawingRoutePoints.length === 0){
            ui.drawingRoutePoints = existing.map(p => ({x:p.x, y:p.y, z:p.z}));
        }
        const base = ui.drawingRoutePoints.length;
        const label = ui.curveMode ? "曲线绘制" : "手绘路线";
        setStatus(base > 0
            ? `已加载现有路线(${base}点)，在终点附近点击继续编辑`
            : `点击画布添加路线点（${label}，自动拾取点云高度），完成后点击「确认提交」`);
    }else if(mode === "edit_route_z"){
        ui.curveMode = false;
        if(ui.drawingRoutePoints.length === 0){
            const existing = getRoutePoints();
            if(existing.length > 0){
                ui.drawingRoutePoints = existing.map(p => ({x:p.x, y:p.y, z:p.z}));
                // 默认选中终点
                if(ui.drawingRoutePoints.length > 0){
                    ui.pendingRouteZIdx = ui.drawingRoutePoints.length - 1;
                }
            }
        }
        setStatus("点击已有路线点以编辑其 Z 高度（默认选中终点）");
    }else if(mode === "delete_route_segment"){
        ui.curveMode = false;
        ui.pendingDeleteRouteIdx = null;
        ui.hoverRouteIdx = null;
        setStatus("点击路线选择删除区间起点，再点击第二个位置选择终点");
    }else if(mode === "plan_goal"){
        ui.curveMode = false;
        ui.pendingPlanGoal = null;
        setStatus("点击地图设置导航目标位置，再点击第二个点设置终点朝向");
    }else if(mode === "set_initial_pose"){
        ui.curveMode = false;
        ui.pendingInitialPose = null;
        setStatus("先点击地图设置位置，再点击第二个点设置朝向（发布/initialpose）");
    }else{
        ui.curveMode = false;
        setStatus("已切换模式");
    }

    updateModeHint();
    render();
}

function cancelCurrentMode(){
    ui.mode = "none";
    ui.curveMode = false;
    // 保留 drawingRoutePoints，下次进入手绘模式可以继续编辑
    ui.hoverWorld = null;
    resetPendingActions();
    updateModeHint();
    updateRouteEditPanel();
    setStatus("已退出手绘模式（路线点已保留）");
    scheduleRender();
}

function clearDrawRoute(){
    ui.drawingRoutePoints = [];
    ui.committedRouteBlockCount = 0;  // 重置已提交的段数
    ui.hoverWorld = null;
    ui.pendingRouteZIdx = null;
    ui.pendingDeleteRouteIdx = null;
    ui.hoverRouteIdx = null;
    if(ui.mode === "draw_route" || ui.mode === "draw_curve"){
        updateModeHint();
        setStatus("已清空手绘路线，从零开始绘制");
    }
    updateRouteEditPanel();
    scheduleRender();
}

function undoDrawRoutePoint(){
    if(ui.drawingRoutePoints.length === 0) return;
    ui.drawingRoutePoints.pop();
    ui.hoverWorld = null;
    if(ui.mode !== "draw_route" && ui.mode !== "draw_curve") ui.mode = "draw_route";
    setStatus(`已撤销，剩余 ${ui.drawingRoutePoints.length} 个点`);
    updateModeHint();
    scheduleRender();
}

async function confirmDrawnRoute(){
    if(ui.drawingRoutePoints.length < 2){
        alert("路线点不足，至少需要2个点");
        return;
    }

    let pts = ui.drawingRoutePoints.map(p => ({
        x: parseFloat(p.x.toFixed(4)),
        y: parseFloat(p.y.toFixed(4)),
        z: parseFloat(p.z.toFixed(4))
    }));

    if(ui.curveMode){
        pts = buildCurvePoints(pts, ui.curveSamplesPerSegment).map(p => ({
            x: parseFloat(p.x.toFixed(4)),
            y: parseFloat(p.y.toFixed(4)),
            z: parseFloat(p.z.toFixed(4))
        }));
    }

    try{
        const d = await api("/api/route/set-points", "POST", {points: pts});
        if(!d.ok){
            alert(d.message || "提交路线失败");
            return;
        }

        // 更新已提交的路线点数
        ui.committedRouteBlockCount = ui.drawingRoutePoints.length;
        
        ui.drawingRoutePoints = [];
        ui.hoverWorld = null;
        ui.mode = "none";
        updateModeHint();
        await refreshState(true);
        setStatus(d.message || "手绘路线已提交");
    }catch(e){
        alert("提交路线失败: " + e.message);
    }
}

function numInput(id, fallback){
    const el = document.getElementById(id);
    if(!el) return fallback;
    const v = parseFloat(el.value);
    return Number.isFinite(v) ? v : fallback;
}

function intInput(id, fallback){
    const el = document.getElementById(id);
    if(!el) return fallback;
    const v = parseInt(el.value, 10);
    return Number.isFinite(v) ? v : fallback;
}

async function publishInitialPose(x, y, z, yawDeg){
    const d = await api("/api/ros/initialpose", "POST", {
        x: Number(x), y: Number(y), z: Number(z), yaw_deg: Number(yawDeg)
    });
    if(!d.ok){
        alert(d.message || "发布initialpose失败");
        setStatus("发布initialpose失败: " + (d.message || "未知错误"));
        return;
    }
    ui.pendingInitialPose = null;
    ui.hoverWorld = null;
    ui.mode = "none";
    updateModeHint();
    scheduleRender();
    setStatus(`已发布initialpose (${x.toFixed(2)}, ${y.toFixed(2)}, ${z.toFixed(2)}, yaw=${yawDeg.toFixed(1)}°)`);
}

function updateRouteEditPanel(){
    const el = document.getElementById("routeEditPanel");
    if(!el) return;
}

function updateModeHint(){
    document.getElementById("modeText").innerText = "当前模式：" + ui.mode;
    let tip = "提示：请选择一个模式。";

    if(ui.mode === "draw_route" || ui.mode === "draw_curve"){
        const base = ui.drawingRoutePoints.length;
        const label = ui.mode === "draw_curve" ? "曲线" : "直线";
        if(base === 0){
            tip = `提示：请点击地图开始绘制${label}路线。`;
        }else{
            tip = `提示：共 ${base} 个点（含已加载的旧路线），继续点击添加，或点击「确认提交」完成。`;
        }
    }else if(ui.mode === "edit_route_z"){
        tip = "提示：点击已添加路线点以编辑其高度。";
    }else if(ui.mode === "delete_route_segment"){
        tip = ui.pendingDeleteRouteIdx === null
            ? "提示：点击绿色路线选择要删除区间的起点。"
            : `提示：已选中第 ${ui.pendingDeleteRouteIdx + 1} 个路线点，请点击终点确认删除区间。`;
    }else if(ui.mode === "plan_goal"){
        tip = ui.pendingPlanGoal
            ? "提示：已选中目标位置，请第二次点击设置终点朝向。"
            : "提示：点击地图设置导航目标位置。";
    }else if(ui.mode === "set_initial_pose"){
        tip = ui.pendingInitialPose
            ? "提示：已选中位置，请第二次点击设置朝向。"
            : "提示：点击地图设置初始位置。";
    }

    document.getElementById("modeHint").innerText = tip;
}

function resetPendingActions(){
    ui.pendingRouteZIdx = null;
    ui.pendingDeleteRouteIdx = null;
    ui.pendingPlanGoal = null;
    ui.pendingInitialPose = null;
    ui.hoverWorld = null;
    ui.hoverRouteIdx = null;
}

function pointFromAny(p){
    if(!p) return {x:0, y:0, z:0};
    if(Array.isArray(p)){
        return {
            x: Number(p[0] || 0),
            y: Number(p[1] || 0),
            z: Number(p[2] || 0)
        };
    }
    return {
        x: Number(p.x || 0),
        y: Number(p.y || 0),
        z: Number(p.z || 0)
    };
}

function _pointsRevisionKey(points){
    return Array.isArray(points) ? String(points.length) : "0";
}

function _normalizePointArray(points, xyOnly=false){
    if(!Array.isArray(points) || points.length === 0) return [];
    const out = new Array(points.length);
    for(let i=0;i<points.length;i++){
        if(xyOnly){
            const p = points[i] || [0, 0];
            out[i] = {x: Number(p[0] || 0), y: Number(p[1] || 0), z: 0};
        }else{
            out[i] = pointFromAny(points[i]);
        }
    }
    return out;
}

function _normalizeMapPoints(){
    const st = ui.state;
    if(!st){
        ui._pointsNormalized = null;
        ui._pointsRevision = 0;
        ui._mapLayersNormalized = {ground: [], inflation: [], obstacle: []};
        ui._mapAllPointsNormalized = [];
        ui._mapLayersRevision = "";
        return;
    }

    const layers = (st.map_layers && typeof st.map_layers === "object") ? st.map_layers : null;
    const groundRaw = layers && Array.isArray(layers.ground) ? layers.ground : [];
    const inflationRaw = layers && Array.isArray(layers.inflation) ? layers.inflation : [];
    const obstacleRaw = layers && Array.isArray(layers.obstacle) ? layers.obstacle : [];
    const layerKey = "g" + _pointsRevisionKey(groundRaw) + "|i" + _pointsRevisionKey(inflationRaw) + "|o" + _pointsRevisionKey(obstacleRaw);

    if(layers && (groundRaw.length > 0 || inflationRaw.length > 0 || obstacleRaw.length > 0)){
        if(ui._mapLayersRevision !== layerKey){
            const ground = _normalizePointArray(groundRaw);
            const inflation = _normalizePointArray(inflationRaw);
            const obstacle = _normalizePointArray(obstacleRaw);
            ui._mapLayersNormalized = {ground, inflation, obstacle};
            ui._mapAllPointsNormalized = ground.concat(inflation, obstacle);
            ui._pointsNormalized = ground.length > 0 ? ground : ui._mapAllPointsNormalized;
            ui._pointsRevision = ground.length;
            ui._mapLayersRevision = layerKey;
        }
        return;
    }

    if(Array.isArray(st.points_xyz) && st.points_xyz.length > 0){
        const len = st.points_xyz.length;
        if(ui._pointsNormalized && ui._pointsRevision === len && ui._mapLayersRevision === "legacy_xyz") return;
        const ground = _normalizePointArray(st.points_xyz);
        ui._pointsNormalized = ground;
        ui._pointsRevision = len;
        ui._mapLayersNormalized = {ground, inflation: [], obstacle: []};
        ui._mapAllPointsNormalized = ground;
        ui._mapLayersRevision = "legacy_xyz";
    }else if(Array.isArray(st.points_xy) && st.points_xy.length > 0){
        const len = st.points_xy.length;
        if(ui._pointsNormalized && ui._pointsRevision === len && ui._mapLayersRevision === "legacy_xy") return;
        const ground = _normalizePointArray(st.points_xy, true);
        ui._pointsNormalized = ground;
        ui._pointsRevision = len;
        ui._mapLayersNormalized = {ground, inflation: [], obstacle: []};
        ui._mapAllPointsNormalized = ground;
        ui._mapLayersRevision = "legacy_xy";
    }else{
        ui._pointsNormalized = null;
        ui._pointsRevision = 0;
        ui._mapLayersNormalized = {ground: [], inflation: [], obstacle: []};
        ui._mapAllPointsNormalized = [];
        ui._mapLayersRevision = "";
    }
}

function getGroundMapPoints(){
    return (ui._mapLayersNormalized && ui._mapLayersNormalized.ground) || ui._pointsNormalized || [];
}

function getObstacleMapPoints(){
    return (ui._mapLayersNormalized && ui._mapLayersNormalized.obstacle) || [];
}

function getInflationMapPoints(){
    return (ui._mapLayersNormalized && ui._mapLayersNormalized.inflation) || [];
}

function getAllMapPoints(){
    return ui._mapAllPointsNormalized || ui._pointsNormalized || [];
}

function getSelectableMapPoints(){
    const ground = getGroundMapPoints();
    return ground.length > 0 ? ground : getAllMapPoints();
}

function getMapZRange(){
    if(ui.cachedZRange.valid) return ui.cachedZRange;

    const pts = getAllMapPoints();
    if(pts.length === 0){
        ui.cachedZRange = {min: 0.0, max: 1.0, valid: false};
        return ui.cachedZRange;
    }

    let lo = Infinity;
    let hi = -Infinity;
    for(const p of pts){
        const z = Number(p.z || 0);
        if(z < lo) lo = z;
        if(z > hi) hi = z;
    }

    if(!Number.isFinite(lo) || !Number.isFinite(hi)){
        lo = 0.0;
        hi = 1.0;
    }
    if(Math.abs(hi - lo) < 1e-6){
        hi = lo + 0.1;
    }

    ui.cachedZRange = {min: lo, max: hi, valid: true};
    return ui.cachedZRange;
}

function normalizeZFilterBounds(){
    if(ui.activeZMin > ui.activeZMax){
        const t = ui.activeZMin;
        ui.activeZMin = ui.activeZMax;
        ui.activeZMax = t;
    }
}

function pointInActiveZ(p){
    if(!ui.useZFilter) return true;
    const z = Number((p && p.z) || 0);
    return z >= ui.activeZMin && z <= ui.activeZMax;
}

function initializeZFilterFromMap(force=false){
    const range = getMapZRange();
    if(!range.valid) return;
    if(ui.zFilterInitialized && !force) return;

    ui.activeZMin = range.min;
    ui.activeZMax = range.max;
    ui.zFilterInitialized = true;
    syncZFilterInputs();
}

function syncZFilterInputs(){
    const enabled = document.getElementById("zFilterEnabled");
    const minInput = document.getElementById("zFilterMin");
    const maxInput = document.getElementById("zFilterMax");
    const info = document.getElementById("zFilterInfo");

    if(enabled) enabled.checked = ui.useZFilter;
    if(minInput) minInput.value = ui.activeZMin.toFixed(2);
    if(maxInput) maxInput.value = ui.activeZMax.toFixed(2);

    if(info){
        const range = getMapZRange();
        const mode = ui.useZFilter
            ? `当前层: ${ui.activeZMin.toFixed(2)} ~ ${ui.activeZMax.toFixed(2)} m`
            : "当前层: 全部高度";
        info.innerText = range.valid
            ? `点云高度范围: ${range.min.toFixed(2)} ~ ${range.max.toFixed(2)} m | ${mode}`
            : `点云高度范围: - | ${mode}`;
    }
}

function applyZFilterInputs(){
    const enabled = document.getElementById("zFilterEnabled");
    const minInput = document.getElementById("zFilterMin");
    const maxInput = document.getElementById("zFilterMax");

    ui.useZFilter = !!(enabled && enabled.checked);
    const minVal = parseFloat(minInput ? minInput.value : ui.activeZMin);
    const maxVal = parseFloat(maxInput ? maxInput.value : ui.activeZMax);
    if(Number.isNaN(minVal) || Number.isNaN(maxVal)){
        alert("请输入有效的 Z 高度范围");
        return;
    }

    ui.activeZMin = minVal;
    ui.activeZMax = maxVal;
    normalizeZFilterBounds();
    ui.zFilterInitialized = true;
    syncZFilterInputs();
    fitView();
}

function useFullZRange(){
    initializeZFilterFromMap(true);
    ui.useZFilter = false;
    syncZFilterInputs();
    fitView();
}

function nudgeZFilter(direction){
    const range = getMapZRange();
    if(!range.valid) return;

    normalizeZFilterBounds();
    const currentSpan = Math.max(0.1, ui.activeZMax - ui.activeZMin);
    const step = currentSpan * 0.85;
    ui.activeZMin += direction * step;
    ui.activeZMax += direction * step;

    if(ui.activeZMin < range.min){
        ui.activeZMin = range.min;
        ui.activeZMax = range.min + currentSpan;
    }
    if(ui.activeZMax > range.max){
        ui.activeZMax = range.max;
        ui.activeZMin = range.max - currentSpan;
    }

    ui.activeZMin = Math.max(range.min, ui.activeZMin);
    ui.activeZMax = Math.min(range.max, ui.activeZMax);
    ui.useZFilter = true;
    ui.zFilterInitialized = true;
    syncZFilterInputs();
    fitView();
}

function setZFilterAroundZ(centerZ, windowSize=null){
    const range = getMapZRange();
    const span = Math.max(0.10, Number(windowSize || ui.zFilterWindow || 0.70));
    let center = Number(centerZ);
    if(!Number.isFinite(center)){
        center = (range.min + range.max) * 0.5;
    }
    ui.activeZMin = center - span * 0.5;
    ui.activeZMax = center + span * 0.5;
    if(range.valid){
        ui.activeZMin = Math.max(range.min, ui.activeZMin);
        ui.activeZMax = Math.min(range.max, ui.activeZMax);
    }
    normalizeZFilterBounds();
    ui.useZFilter = true;
    ui.zFilterInitialized = true;
    syncZFilterInputs();
    fitView();
}

function setZFilterAroundCurrentPose(){
    if(ui.state && ui.state.current_pose && ui.state.current_pose.z !== undefined){
        setZFilterAroundZ(Number(ui.state.current_pose.z || 0.0));
        setStatus("已按当前机器人高度筛选楼层");
        return;
    }
    setZFilterAroundZ(getDefaultDrawPlaneZ());
    setStatus("未收到定位高度，已按默认高度筛选");
}

function getRoutePoints(){
    if(!ui.state || !Array.isArray(ui.state.route_polyline)) return [];
    return ui.state.route_polyline.map(pointFromAny);
}

function getRemainingRoutePoints(){
    const full = getRoutePoints();
    if(full.length < 2) return [];
    if(!ui.state.nav || !ui.state.nav.is_auto_moving) return full;
    const idx = Math.max(0, (ui.state.nav.nav_progress_idx || 0));
    if(idx >= full.length) return full;
    const result = full.slice(idx);
    if(result.length < 2) return full;
    return result;
}

function getViewMatrix(){
    const cy = Math.cos(ui.view.yaw);
    const sy = Math.sin(ui.view.yaw);
    const cp = Math.cos(ui.view.pitch);
    const sp = Math.sin(ui.view.pitch);

    return {
        r00: cy,      r01: -sy,     r02: 0.0,
        r10: cp*sy,   r11: cp*cy,   r12: -sp,
        r20: sp*sy,   r21: sp*cy,   r22: cp
    };
}

function projectPoint(p, _m){
    const m = _m || getViewMatrix();

    const x = p.x - ui.view.centerX;
    const y = p.y - ui.view.centerY;
    const z = p.z - ui.view.centerZ;

    const vx = m.r00*x + m.r01*y + m.r02*z;
    const vy = m.r10*x + m.r11*y + m.r12*z;
    const vz = m.r20*x + m.r21*y + m.r22*z;

    return {
        x: canvas.width / 2 + ui.view.offsetX + vx * ui.view.scale,
        y: canvas.height / 2 + ui.view.offsetY - vz * ui.view.scale,
        depth: vy,
        vx: vx,
        vy: vy,
        vz: vz
    };
}

function screenToWorldOnPlane(sx, sy, planeZ=0.0){
    const m = getViewMatrix();
    const px = (sx - (canvas.width / 2 + ui.view.offsetX)) / ui.view.scale;
    const pz = - (sy - (canvas.height / 2 + ui.view.offsetY)) / ui.view.scale;

    const vz = planeZ - ui.view.centerZ;

    const a00 = m.r00, a01 = m.r01;
    const a10 = m.r20, a11 = m.r21;
    const b0 = px - m.r02 * vz;
    const b1 = pz - m.r22 * vz;

    const det = a00 * a11 - a01 * a10;
    if(Math.abs(det) < 1e-9) return null;

    const vx = (b0 * a11 - b1 * a01) / det;
    const vy = (a00 * b1 - a10 * b0) / det;

    return {
        x: vx + ui.view.centerX,
        y: vy + ui.view.centerY,
        z: planeZ
    };
}

// 点云拾取：从屏幕坐标找最近的点云点（用于手绘路线获取精确Z值）
function pickNearestPointCloudPoint(sx, sy, maxScreenDist=30){
    const allPts = getSelectableMapPoints();
    if(allPts.length === 0) return null;

    let best = null;
    let bestDist = maxScreenDist * maxScreenDist;

    // 为了性能，对大点云做随机采样检查
    const step = allPts.length > 50000 ? Math.floor(allPts.length / 50000) : 1;

    for(let i = 0; i < allPts.length; i += step){
        if(!pointInActiveZ(allPts[i])) continue;
        const sp = projectPoint(allPts[i]);
        const d = (sp.x - sx) * (sp.x - sx) + (sp.y - sy) * (sp.y - sy);
        if(d < bestDist){
            bestDist = d;
            best = allPts[i];
        }
    }

    // 如果采样后找到候选点，在附近精细搜索
    if(best && step > 1){
        const refineRadius = step * 3;
        const start = Math.max(0, allPts.indexOf(best) - refineRadius);
        const end = Math.min(allPts.length, allPts.indexOf(best) + refineRadius);
        for(let i = start; i < end; i++){
            if(!pointInActiveZ(allPts[i])) continue;
            const sp = projectPoint(allPts[i]);
            const d = (sp.x - sx) * (sp.x - sx) + (sp.y - sy) * (sp.y - sy);
            if(d < bestDist){
                bestDist = d;
                best = allPts[i];
            }
        }
    }

    return best ? {x: best.x, y: best.y, z: best.z} : null;
}

// 手绘路线预览高度：用于鼠标移动时的预览点
function getDefaultDrawPlaneZ(){
    if(ui.useZFilter){
        return (ui.activeZMin + ui.activeZMax) * 0.5;
    }
    if(ui.cachedZRange.valid){
        return (ui.cachedZRange.min + ui.cachedZRange.max) * 0.5;
    }
    const pts = getSelectableMapPoints();
    if(pts.length > 0){
        let sum = 0;
        pts.forEach(p=>sum += p.z || 0);
        return sum / pts.length;
    }
    return 0.0;
}

function getActivePlanningPlaneZ(){
    if(ui.useZFilter){
        if(ui.state && ui.state.current_pose && ui.state.current_pose.z !== undefined){
            const z = Number(ui.state.current_pose.z || 0.0);
            if(z >= ui.activeZMin && z <= ui.activeZMax) return z;
        }
        return (ui.activeZMin + ui.activeZMax) * 0.5;
    }
    if(ui.state && ui.state.current_pose && ui.state.current_pose.z !== undefined){
        return Number(ui.state.current_pose.z || 0.0);
    }
    return getDefaultDrawPlaneZ();
}

function getDrawRouteHoverPoint(sx, sy){
    const picked = pickNearestPointCloudPoint(sx, sy);
    if(picked) return picked;
    // 点云外回退到默认高度平面
    return screenToWorldOnPlane(sx, sy, getDefaultDrawPlaneZ());
}

function getPlanningPointFromCanvas(sx, sy){
    const picked = pickNearestPointCloudPoint(sx, sy, ui.useZFilter ? 55 : 35);
    if(picked) return picked;
    return screenToWorldOnPlane(sx, sy, getActivePlanningPlaneZ());
}

}

function drawCircle2D(p, r, fill="#ef4444", stroke=null, lineW=1){
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    if(fill){
        ctx.fillStyle = fill;
        ctx.fill();
    }
    if(stroke){
        ctx.strokeStyle = stroke;

function drawText2D(text, x, y, color="#fff"){

    ctx.fillText(text, x, y);
}

function drawArrowProjected(p0, p1, color="#f59e0b", lineW=2){
    const s0 = projectPoint(pointFromAny(p0));
    const s1 = projectPoint(pointFromAny(p1));

    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.beginPath();
    ctx.moveTo(s0.x, s0.y);
    ctx.lineTo(s1.x, s1.y);
    ctx.stroke();

    const dx = s1.x - s0.x;
    const dy = s1.y - s0.y;
    const len = Math.hypot(dx, dy);
    if(len < 1e-6) return;

    const ux = dx / len;
    const uy = dy / len;
    const ah = 8;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(s1.x, s1.y);
    ctx.lineTo(s1.x - ux*ah - uy*ah*0.6, s1.y - uy*ah + ux*ah*0.6);
    ctx.lineTo(s1.x - ux*ah + uy*ah*0.6, s1.y - uy*ah - ux*ah*0.6);
    ctx.closePath();
    ctx.fill();
}

function buildCirclePoints3D(center, radius, zOffset, n=18){
    const out = [];
    for(let i=0;i<n;i++){
        const a = i / n * Math.PI * 2;
        out.push({
            x: center.x + radius * Math.cos(a),
            y: center.y + radius * Math.sin(a),
            z: center.z + zOffset
        });
    }
    return out;
}

function drawPolylineProjected(points, color="#22c55e", lineW=2){
    if(!points || points.length < 2) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.beginPath();
    points.forEach((p, i)=>{
        const sp = projectPoint(p);
        if(i === 0) ctx.moveTo(sp.x, sp.y);
        else ctx.lineTo(sp.x, sp.y);
    });
    ctx.stroke();
}

function drawFilteredPolylineProjected(points, color="#22c55e", lineW=2){
    if(!points || points.length < 2) return;
    if(!ui.useZFilter){
        drawPolylineProjected(points, color, lineW);
        return;
    }

    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.beginPath();
    let drawing = false;

    for(let i = 0; i < points.length - 1; i++){
        const aIn = pointInActiveZ(points[i]);
        const bIn = pointInActiveZ(points[i + 1]);
        if(!aIn && !bIn){
            drawing = false;
            continue;
        }

        const a = projectPoint(points[i]);
        const b = projectPoint(points[i + 1]);
        if(!drawing || !aIn){
            ctx.moveTo(a.x, a.y);
            drawing = true;
        }
        ctx.lineTo(b.x, b.y);
        if(!bIn){
            drawing = false;
        }
    }

    ctx.stroke();
}

function findNearestDrawingRoutePointProjected(sx, sy, thresholdPx=24){
    if(!ui.drawingRoutePoints || ui.drawingRoutePoints.length === 0) return null;
    let bestIdx = null;
    let bestDist = 1e18;
    ui.drawingRoutePoints.forEach((p, i)=>{
        if(!pointInActiveZ(p)) return;
        const sp = projectPoint(p);
        const d = Math.hypot(sx - sp.x, sy - sp.y);
        if(d < bestDist){
            bestDist = d;
            bestIdx = i;
        }
    });
    if(bestDist <= thresholdPx) return bestIdx;
    return null;
}

function setDrawingRoutePointZ(idx, z){

function autoAdjustRouteHeights(){
    if(ui.drawingRoutePoints.length < 2) return;

    // 自动从点云获取高度
    const pts = getSelectableMapPoints();
    if(pts.length === 0) return;

    ui.drawingRoutePoints.forEach((p, i) => {
        // 为每个路线点找到最近的点云点
        let bestDist = 1e18;
        let bestZ = p.z;
        pts.forEach(pc => {
            if(!pointInActiveZ(pc)) return;
            const d = Math.hypot(p.x - pc.x, p.y - pc.y);
            if(d < bestDist && d < 0.5){ // 0.5m 范围内
                bestDist = d;
                bestZ = pc.z;
            }
        });
        ui.drawingRoutePoints[i].z = bestZ;
    });

    if(ui.pendingRouteZIdx !== null){
        updateRouteEditPanel();
    }
    scheduleRender();
    setStatus("已自动调整所有路线点高度到附近点云");
}

function interpolateRouteHeights(){
    if(ui.drawingRoutePoints.length < 2) return;

    // 简单线性插值中间点高度
    const startIdx = 0;
    const endIdx = ui.drawingRoutePoints.length - 1;
    const startZ = ui.drawingRoutePoints[startIdx].z;
    const endZ = ui.drawingRoutePoints[endIdx].z;

    for(let i = startIdx + 1; i < endIdx; i++){
        const t = (i - startIdx) / (endIdx - startIdx);
        ui.drawingRoutePoints[i].z = startZ + t * (endZ - startZ);
    }

    if(ui.pendingRouteZIdx !== null){
        updateRouteEditPanel();
    }
    scheduleRender();
}

function catmullRomPoint(p0, p1, p2, p3, t){
    const t2 = t * t;
    const t3 = t2 * t;
    return {
        x: 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * t + (2*p0.x - 5*p1.x + 4*p2.x - p3.x) * t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x) * t3),
        y: 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * t + (2*p0.y - 5*p1.y + 4*p2.y - p3.y) * t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y) * t3),
        z: 0.5 * ((2 * p1.z) + (-p0.z + p2.z) * t + (2*p0.z - 5*p1.z + 4*p2.z - p3.z) * t2 + (-p0.z + 3*p1.z - 3*p2.z + p3.z) * t3)
    };
}

function buildCurvePoints(points, samplesPerSegment=16){
    if(!points || points.length < 2) return points ? points.slice() : [];
    const out = [];
    const n = points.length;
    for(let i = 0; i < n - 1; i++){
        const p0 = i === 0 ? points[i] : points[i - 1];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = i + 2 < n ? points[i + 2] : points[i + 1];

        for(let j = 0; j < samplesPerSegment; j++){
            const t = j / samplesPerSegment;
            out.push(catmullRomPoint(p0, p1, p2, p3, t));
        }
    }
    out.push(points[n - 1]);
    return out;
}

function drawCurveProjected(points, color="#f97316", lineW=2){

function drawClosedProjected(points, fillStyle=null, strokeStyle="#fff", lineW=1){

}

function pointToSegmentDistance2D(px, py, ax, ay, bx, by){
    const abx = bx - ax;
    const aby = by - ay;
    const ab2 = abx * abx + aby * aby;
    if(ab2 < 1e-12){
        const dx = px - ax, dy = py - ay;
        return {
            dist: Math.hypot(dx, dy),
            t: 0,
            x: ax,
            y: ay
        };
    }
    let t = ((px - ax)*abx + (py - ay)*aby) / ab2;
    t = Math.max(0, Math.min(1, t));
    const qx = ax + t * abx;
    const qy = ay + t * aby;
    return {
        dist: Math.hypot(px - qx, py - qy),
        t: t,
        x: qx,
        y: qy
    };
}

function findNearestPointOnRouteProjected(sx, sy, thresholdPx=14){
    const route = getRoutePoints();
    if(route.length < 2) return null;

    let best = null;
    for(let i=0;i<route.length-1;i++){
        if(!pointInActiveZ(route[i]) && !pointInActiveZ(route[i + 1])) continue;
        const a = projectPoint(route[i]);
        const b = projectPoint(route[i+1]);

        const d = pointToSegmentDistance2D(sx, sy, a.x, a.y, b.x, b.y);
        const t = d.t;
        const point = {
            x: route[i].x + t * (route[i+1].x - route[i].x),
            y: route[i].y + t * (route[i+1].y - route[i].y),
            z: route[i].z + t * (route[i+1].z - route[i].z)
        };
        if(!pointInActiveZ(point)) continue;

        if(best === null || d.dist < best.dist){
            best = {
                dist: d.dist,
                point: point,
                segIdx: i,
                t: t
            };
        }
    }

    if(best && best.dist <= thresholdPx) return best.point;
    return null;
}

function findNearestRouteIndexProjected(sx, sy, thresholdPx=16){
    const route = getRoutePoints();
    if(route.length === 0) return null;

    let bestIdx = null;
    let bestDist = 1e18;

    if(route.length >= 2){
        for(let i = 0; i < route.length - 1; i++){
            if(!pointInActiveZ(route[i]) && !pointInActiveZ(route[i + 1])) continue;

            const a = projectPoint(route[i]);
            const b = projectPoint(route[i + 1]);
            const d = pointToSegmentDistance2D(sx, sy, a.x, a.y, b.x, b.y);
            const point = {
                x: route[i].x + d.t * (route[i + 1].x - route[i].x),
                y: route[i].y + d.t * (route[i + 1].y - route[i].y),
                z: route[i].z + d.t * (route[i + 1].z - route[i].z)
            };
            if(!pointInActiveZ(point)) continue;

            if(d.dist < bestDist){
                bestDist = d.dist;
                bestIdx = d.t < 0.5 ? i : i + 1;
            }
        }
    }

    route.forEach((p, i)=>{
        if(!pointInActiveZ(p)) return;
        const sp = projectPoint(p);
        const d = Math.hypot(sx - sp.x, sy - sp.y);
        if(d < bestDist){
            bestDist = d;
            bestIdx = i;
        }
    });

    return bestDist <= thresholdPx ? bestIdx : null;
}

function getRouteDeleteRange(){
    if(ui.pendingDeleteRouteIdx === null || ui.hoverRouteIdx === null) return null;
    const a = Math.min(ui.pendingDeleteRouteIdx, ui.hoverRouteIdx);
    const b = Math.max(ui.pendingDeleteRouteIdx, ui.hoverRouteIdx);
    return {start: a, end: b};
}

async function deleteRouteRange(startIdx, endIdx){
    const route = getRoutePoints();
    if(route.length < 2) throw new Error("当前没有可删除的路线");

    let start = Math.max(0, Math.min(startIdx, route.length - 1));
    let end = Math.max(0, Math.min(endIdx, route.length - 1));
    if(start > end){
        const t = start;
        start = end;
        end = t;
    }

    if(start === end){
        if(end < route.length - 1) end += 1;
        else if(start > 0) start -= 1;
    }

    const remaining = route
        .slice(0, start)
        .concat(route.slice(end + 1))
        .map(p => ({
            x: parseFloat(p.x.toFixed(4)),
            y: parseFloat(p.y.toFixed(4)),
            z: parseFloat(p.z.toFixed(4))
        }));

    if(remaining.length < 2){
        alert("删除后路线点不足，若要删除整条路线请使用「清空路线和路点」。");
        return;
    }

    const msg = `将删除第 ${start + 1} 到 ${end + 1} 个路线点，共 ${end - start + 1} 点。当前路线必须保持连续，删除后两侧会自动连接。`;
    if(!confirm(msg)) return;

    const d = await api("/api/route/set-points", "POST", {points: remaining});
    if(!d.ok){
        alert(d.message || "删除路线段失败");
        return;
    }

    ui.pendingDeleteRouteIdx = null;
    ui.hoverRouteIdx = null;
    await refreshState(true);
    setStatus(`已删除路线区间，剩余 ${remaining.length} 个点`);
    updateModeHint();
}

function renderPointCloud(points, color, pointSize) {
    ctx.fillStyle = color;
    
    for (const point of points) {
        // 投影到屏幕坐标
        const screenPoint = projectPoint(point);
        
        // 绘制点
        ctx.beginPath();
        ctx.arc(screenPoint.x, screenPoint.y, pointSize, 0, Math.PI * 2);
        ctx.fill();
    }
}

let _renderPending = false;
let _renderLocked = false;
function scheduleRender(){
    if(_renderLocked) return;
    if(_renderPending) return;
    _renderPending = true;
    requestAnimationFrame(()=>{
        _renderPending = false;
        if(_renderLocked) return;
        try{render();}catch(e){console.error("[render]",e);}
    });
}

function render(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if(!ui.state) return;

    var _cy=Math.cos(ui.view.yaw),_sy=Math.sin(ui.view.yaw);
    var _cp=Math.cos(ui.view.pitch),_sp=Math.sin(ui.view.pitch);
    var _m={r00:_cy,r01:-_sy,r02:0,r10:_cp*_sy,r11:_cp*_cy,r12:-_sp,r20:_sp*_sy,r21:_sp*_cy,r22:_cp};
    var _hw=canvas.width/2+ui.view.offsetX,_hh=canvas.height/2+ui.view.offsetY,_sc=ui.view.scale;
    var _cx=ui.view.centerX,_cyc=ui.view.centerY,_cz=ui.view.centerZ;
    var _proj=function(p){
        var x=p.x-_cx,y=p.y-_cyc,z=p.z-_cz;
        var vx=_m.r00*x+_m.r01*y+_m.r02*z;
        var vy=_m.r10*x+_m.r11*y+_m.r12*z;
        var vz=_m.r20*x+_m.r21*y+_m.r22*z;
        return {x:_hw+vx*_sc,y:_hh-vz*_sc,depth:vy};
    }

    var zMin=0,zMax=1;
    if(ui.showPcd){
        var pts=getAllMapPoints();
        if(pts.length>0){
            var zr=getMapZRange();zMin=zr.min;zMax=zr.max;
            var groundPts=getGroundMapPoints(), inflationPts=getInflationMapPoints(), obstaclePts=getObstacleMapPoints();
            var lx=canvas.width-172,ly=40,lw=144,lh=96;
            ctx.save();
            ctx.globalAlpha=0.88;
            ctx.fillStyle="rgba(3, 7, 18, 0.62)";
            ctx.fillRect(lx,ly,lw,lh);
            ctx.strokeStyle="rgba(255,255,255,0.36)";
            ctx.lineWidth=1;
            ctx.strokeRect(lx,ly,lw,lh);
            ctx.globalAlpha=1.0;
            drawText2D("处理后地图",lx+10,ly+18,"#fff");
            ctx.fillStyle="rgba(34,197,94,0.72)";
            ctx.fillRect(lx+12,ly+30,12,8);
            drawText2D("地面 "+groundPts.length,lx+30,ly+38,"#d1fae5");
            ctx.fillStyle="rgba(251,191,36,0.70)";
            ctx.fillRect(lx+12,ly+50,12,8);
            drawText2D("膨胀层 "+inflationPts.length,lx+30,ly+58,"#fef3c7");
            ctx.fillStyle="rgba(248,113,113,0.88)";
            ctx.fillRect(lx+12,ly+70,12,8);
            drawText2D("障碍物 "+obstaclePts.length,lx+30,ly+78,"#fee2e2");
            ctx.restore();
            if(ui.useZFilter){
                var flx=lx,fly=ly+lh+14,flw=128,flh=28;
                var topT=(ui.activeZMax-zMin)/(zMax-zMin||1);
                var botT=(ui.activeZMin-zMin)/(zMax-zMin||1);
                ctx.save();
                ctx.fillStyle="rgba(251,191,36,0.13)";
                ctx.strokeStyle="#fbbf24";
                ctx.lineWidth=1.5;
                ctx.fillRect(flx,fly,flw,flh);
                ctx.strokeRect(flx,fly,flw,flh);
                drawText2D(
                    "Z层 "+ui.activeZMin.toFixed(2)+"~"+ui.activeZMax.toFixed(2)+"m",
                    flx+8,fly+18,"#fbbf24"
                );
                ctx.restore();
            }
        }
    }

    renderAxesHint();

    if(ui.showPcd){
        var drawLayer=function(pts,color,size){
            if(!pts||pts.length===0)return;
            var useF=ui.useZFilter,azMin=ui.activeZMin,azMax=ui.activeZMax;
            ctx.fillStyle=color;
            for(var i=0;i<pts.length;i++){
                var p=pts[i];
                if(useF){var pz=p.z;if(pz<azMin||pz>azMax)continue;}
                var sp=_proj(p);
                if(sp.x<-10||sp.x>canvas.width+10||sp.y<-10||sp.y>canvas.height+10)continue;
                ctx.fillRect(sp.x,sp.y,size,size);
            }
        };
        drawLayer(getGroundMapPoints(),"rgba(34,197,94,0.58)",1.35);
        drawLayer(getInflationMapPoints(),"rgba(251,191,36,0.46)",1.55);
        drawLayer(getObstacleMapPoints(),"rgba(248,113,113,0.90)",1.85);
    }

    if(ui.pendingPlanGoal){
        var goal=pointFromAny(ui.pendingPlanGoal);
        drawCircle2D(projectPoint(goal),7,"#f59e0b","#fff",1.5);
        if(ui.hoverWorld&&ui.mode==="plan_goal")drawArrowProjected(goal,ui.hoverWorld,"#f59e0b",2.5);
    }

    if(ui.pendingInitialPose){
        var pos=pointFromAny(ui.pendingInitialPose);
        drawCircle2D(projectPoint(pos),7,"#3b82f6","#fff",1.5);
        if(ui.hoverWorld&&ui.mode==="set_initial_pose")drawArrowProjected(pos,ui.hoverWorld,"#3b82f6",2.5);
    }

    if(ui.showRoute){
        var route=getRoutePoints(),remaining=getRemainingRoutePoints();
        if(remaining.length>=2){
            drawFilteredPolylineProjected(remaining,"#22c55e",2.4);
            if(ui.mode==="delete_route_segment"){
                if(ui.pendingDeleteRouteIdx!==null&&route[ui.pendingDeleteRouteIdx]){
                    var p=projectPoint(route[ui.pendingDeleteRouteIdx]);
                    drawCircle2D(p,7,"#fbbf24","#fff",1.5);
                    drawText2D("删段起点",p.x+8,p.y-8,"#fbbf24");
                }
                var range=getRouteDeleteRange();
                if(range){
                    var rpts=route.slice(range.start,range.end+1);
                    drawFilteredPolylineProjected(rpts,"#ef4444",4);
                }
                if(ui.hoverRouteIdx!==null&&route[ui.hoverRouteIdx]){
                    var p=projectPoint(route[ui.hoverRouteIdx]);
                    drawCircle2D(p,6,"#ef4444","#fff",1.5);
                }
            }
        }
    }

    if((ui.mode==="draw_route"||ui.mode==="draw_curve")&&ui.drawingRoutePoints.length>=2){
        if(ui.curveMode)drawCurveProjected(ui.drawingRoutePoints,"#f97316",2.5);
        else drawPolylineProjected(ui.drawingRoutePoints,"#f97316",2.5);
    }

    if((ui.mode==="draw_route"||ui.mode==="draw_curve"||ui.mode==="edit_route_z")&&ui.drawingRoutePoints.length>0){
        var mX=ui.drag.lastX||(canvas.width/2),mY=ui.drag.lastY||(canvas.height/2);
        ui.drawingRoutePoints.forEach(function(p,i){
            if(!pointInActiveZ(p))return;
            var sp=projectPoint(p);
            var isS=ui.mode==="edit_route_z"&&ui.pendingRouteZIdx===i;
            var isH=ui.mode==="edit_route_z"&&findNearestDrawingRoutePointProjected(mX,mY,24)===i;
            drawCircle2D(sp,isS?8:(isH?6:5),isS?"#fbbf24":(isH?"#fbbf24":"#f97316"),"#fff",1);
            drawText2D((i+1)+"(z="+p.z.toFixed(2)+")",sp.x+7,sp.y-5,isS?"#fbbf24":(isH?"#fbbf24":"#f97316"));
            if(isS)drawCircle2D(sp,12,"rgba(251,191,36,0.3)","#fbbf24",2);
        });
        if(ui.hoverWorld&&(ui.mode==="draw_route"||ui.mode==="draw_curve")){
            var lastPt=ui.drawingRoutePoints[ui.drawingRoutePoints.length-1];
            var hp=projectPoint(ui.hoverWorld),lp=projectPoint(lastPt);
            ctx.setLineDash([5,5]);ctx.strokeStyle="#f97316";ctx.lineWidth=1.5;
            ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(hp.x,hp.y);ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    if(ui.state.nav&&ui.state.nav.lookahead_target){
        var p=projectPoint(pointFromAny(ui.state.nav.lookahead_target));
        drawCircle2D(p,6,"#f59e0b");
    }

    if(ui.showRobot&&ui.state.current_pose){
        ui._render_seq=(ui._render_seq||0)+1;
        if(ui._render_seq%50===1){
            var cp=ui.state.current_pose;
            console.log("[RENDER #"+ui._render_seq+"] robot at:","x="+cp.x?.toFixed(2)+" y="+cp.y?.toFixed(2)+" z="+cp.z?.toFixed(2)+" yaw_deg="+cp.yaw_deg?.toFixed(1));
        }
        var pose=pointFromAny(ui.state.current_pose);
        var yaw=Number(ui.state.current_pose.yaw_deg||0)*Math.PI/180;

        var stateColor,strokeColor,arrowColor;
        if(ui.state.nav&&ui.state.nav.is_auto_moving){
            stateColor="#22c55e";strokeColor="#bbf7d0";arrowColor="#facc15";
        } else {
            stateColor="#2492ff";strokeColor="#ffffff";arrowColor="#facc15";
        }

        drawCylinderProjected({x:pose.x,y:pose.y,z:pose.z},0.11,0.22,stateColor,strokeColor);

        var speed=Math.abs(ui.state.current_vx||0);
        var arrowLen=Math.max(0.2,Math.min(1.2,0.25+speed*1.5));
        var aS={x:pose.x,y:pose.y,z:pose.z+0.14};
        var aE={x:aS.x+arrowLen*Math.cos(yaw),y:aS.y+arrowLen*Math.sin(yaw),z:aS.z};
        drawArrowProjected(aS,aE,arrowColor,speed>0.05?4:2);

        var labelP=projectPoint({x:pose.x,y:pose.y,z:pose.z+0.35});
        var labelTxt=ui.state.nav&&ui.state.nav.is_auto_moving?"导航中":"待命";
        drawText2D(labelTxt,labelP.x-15,labelP.y,"#fff");
    }
}

function collectAllPointsForFit(){
    const pts = [];

    const mapPts = getAllMapPoints();
    if(mapPts.length > 0){
        const step = Math.max(1, Math.floor(mapPts.length / 4000));
        for(let i=0;i<mapPts.length;i+=step){
            if(pointInActiveZ(mapPts[i])) pts.push(mapPts[i]);
        }
    }

    getRoutePoints().forEach(p=>{ if(pointInActiveZ(p)) pts.push(p); });

    if(ui.state && ui.state.current_pose){
        const p = pointFromAny(ui.state.current_pose);
        if(pointInActiveZ(p)) pts.push(p);
    }
    if(ui.state && ui.state.nav && ui.state.nav.lookahead_target){
        const p = pointFromAny(ui.state.nav.lookahead_target);
        if(pointInActiveZ(p)) pts.push(p);
    }
    ui.drawingRoutePoints.forEach(p => { if(pointInActiveZ(p)) pts.push(p); });

    return pts;
}

function fitView(){
    const pts = collectAllPointsForFit();
    if(pts.length === 0){
        resetView();
        return;
    }

    let minX = Infinity, minY = Infinity, minZ = Infinity;
    let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;

    pts.forEach(p=>{
        minX = Math.min(minX, p.x);
        minY = Math.min(minY, p.y);
        minZ = Math.min(minZ, p.z);
        maxX = Math.max(maxX, p.x);
        maxY = Math.max(maxY, p.y);
        maxZ = Math.max(maxZ, p.z);
    });

    ui.view.centerX = (minX + maxX) * 0.5;
    ui.view.centerY = (minY + maxY) * 0.5;
    ui.view.centerZ = (minZ + maxZ) * 0.5;
    ui.view.offsetX = 0;
    ui.view.offsetY = 0;

    let xs = [], ys = [];
    pts.forEach(p=>{
        const sp = projectPoint(p);
        xs.push(sp.x);
        ys.push(sp.y);
    });

    let minSX = Math.min(...xs), maxSX = Math.max(...xs);
    let minSY = Math.min(...ys), maxSY = Math.max(...ys);
    let w = Math.max(1e-6, maxSX - minSX);
    let h = Math.max(1e-6, maxSY - minSY);

    const pad = 50;
    const sx = (canvas.width - pad * 2) / w;
    const sy = (canvas.height - pad * 2) / h;
    ui.view.scale = ui.view.scale * Math.min(sx, sy);

    // 再微调一次
    xs = []; ys = [];
    pts.forEach(p=>{
        const sp = projectPoint(p);
        xs.push(sp.x);
        ys.push(sp.y);
    });
    minSX = Math.min(...xs); maxSX = Math.max(...xs);
    minSY = Math.min(...ys); maxSY = Math.max(...ys);

    const centerScreenX = (minSX + maxSX) * 0.5;
    const centerScreenY = (minSY + maxSY) * 0.5;

    ui.view.offsetX += canvas.width * 0.5 - centerScreenX;
    ui.view.offsetY += canvas.height * 0.5 - centerScreenY;

    scheduleRender();
}

async function refreshState(fit=false){
    if(ui.fullRefreshBusy) return;
    ui.fullRefreshBusy = true;
    try{
        const oldMapRev = ui.revisions.map;
        ui.state = await api("/api/state");
        try{
            const paramsResp = await api("/api/params");
            if(paramsResp.ok && paramsResp.default_config_path){
                const pathText = "默认参数文件: " + paramsResp.default_config_path;
                const el = document.getElementById("defaultParamsPathText");
                if(el && el.innerText !== pathText) el.innerText = pathText;
                ui.defaultParamsPath = paramsResp.default_config_path;
            }
        }catch(_e){}
        ui.revisions = getRevisions(ui.state);
        // 地图数据变化时清除 Z 范围缓存
        if(ui.revisions.map !== oldMapRev){
            ui.cachedZRange = {min: 0, max: 1, valid: false};
            ui.zFilterInitialized = false;
            ui._pointsNormalized = null; ui._pointsRevision = 0;
            ui._mapLayersNormalized = {ground: [], inflation: [], obstacle: []};
            ui._mapAllPointsNormalized = [];
            ui._mapLayersRevision = "";
        }
        _normalizeMapPoints();
        initializeZFilterFromMap(false);
        syncInputs(true);
        syncZFilterInputs();
        updateInfo();
        if(fit) fitView();
        scheduleRender();
    }finally{
        ui.fullRefreshBusy = false;
    }
}

function updateInfo(){
    if(!ui.state)return;
    var ic=ui._infoCache;
    setBackendStatus(ui.state.status_text||"等待操作");
    if(ui.state.current_pose){
        var pt='当前位置: X='+ui.state.current_pose.x.toFixed(2)+' Y='+ui.state.current_pose.y.toFixed(2)+' Z='+(ui.state.current_pose.z||0).toFixed(2)+' Yaw='+ui.state.current_pose.yaw_deg.toFixed(1)+'°';
        document.getElementById("poseText").innerText=pt;
    }else{document.getElementById("poseText").innerText="当前位置: X=--- Y=--- Z=--- Yaw=---";}
    var vt='当前速度: vx='+(ui.state.current_vx||0).toFixed(2)+' wz='+(ui.state.current_wz||0).toFixed(2);
    if(ic._vel!==vt){ic._vel=vt;document.getElementById("velText").innerText=vt;}
    var nt="导航阶段: "+((ui.state.nav&&ui.state.nav.stage)||"-");
    if(ic._nav!==nt){ic._nav=nt;document.getElementById("navText").innerText=nt;}
    if(ui.state.nav&&ui.state.nav.lookahead_target){
        var p=ui.state.nav.lookahead_target;
        var lt='前视目标: ('+p.x.toFixed(2)+', '+p.y.toFixed(2)+', '+(p.z||0).toFixed(2)+')';
        if(ic._look!==lt){ic._look=lt;document.getElementById("lookaheadText").innerText=lt;}
    }else{if(ic._look!=='-'){ic._look='-';document.getElementById("lookaheadText").innerText="前视目标: -";}}
    var ct="图像话题: "+((ui.state.camera&&ui.state.camera.topic)||"-");
    if(ic._cam!==ct){ic._cam=ct;document.getElementById("cameraTopicText").innerText=ct;}
    var lines=[];
    lines.push("地图: "+(ui.state.pcd_path||"未加载"));
    if(ui.useZFilter)lines.push('当前高度层: '+ui.activeZMin.toFixed(2)+' ~ '+ui.activeZMax.toFixed(2)+' m');
    else lines.push("当前高度层: 全部高度");
    var topics=ui.state.topics||{};
    lines.push("开启导航话题: "+(topics.nav_start_topic||"-"));
    lines.push("停止导航话题: "+(topics.nav_stop_topic||"-"));
    lines.push("导航完成话题: "+(topics.nav_done_topic||"-"));
    lines.push("默认参数文件: "+(ui.defaultParamsPath||"-"));
    lines.push("路线点数: "+((ui.state.route_polyline||[]).length));
    var ri=lines.join("\n");
    if(ic._routeInfo!==ri){ic._routeInfo=ri;document.getElementById("routeInfo").textContent=ri;}
}
