# MID360 local feature extraction used by route_tracker obstacle avoidance.
# The old DDDMR p2p_move_base/local_planner/perception_3d stack was removed
# from this workspace; keep this file focused on mcl_feature only.

mcl_ip:
  ros__parameters:
    laser:
      odom_type: "wheel_odometry"
      baselink_frame: "base_link"
      num_vertical_scans: 40
      num_horizontal_scans: 600
      vertical_angle_bottom: -7.0
      vertical_angle_top: 55.0
      scan_period: 0.1
    imageProjection:
      input_type: "livox_custom"
      segment_valid_point_num: 5
      segment_valid_line_num: 2
      segment_theta: 60.0
      minimum_detection_range: 0.05
      maximum_detection_range: 12.0
      input_point_stride: 2
      distance_for_patch_between_rings: 1.0
      stitcher_num: 3
      trt_model_path: ""
      projected_image_stack_size: 1
      patch_first_ring_to_baselink: false
      ground_slope_tolerance: 0.3
      ground_fov_bottom: -0.2617994
      ground_fov_top: -0.087266
      ground_positive_start: 0.0
      ground_positive_stop: 3.1415926
      ground_negative_start: 0.0
      ground_negative_stop: -3.1415926

mcl_fa:
  ros__parameters:
    featureAssociation:
      edge_threshold: 0.1
      surf_threshold: 0.1
      nearest_feature_search_distance: 3.0
