pct_get_plan_server:
  ros__parameters:
    pct_root: ""
    tomogram_path: ""
    action_name: "get_dwa_plan"
    map_frame: "map"
    robot_frame: "base_link"
    localization_topic: "/localization"
    start_source: "localization"
    default_start_z: 0.0
    default_goal_z: 0.0
    pose_z_offset: 0.0
    goal_z_offset: 0.0
    use_quintic: true
    max_heading_rate: 10.0
    robot_radius_cells: 20
    safety_margin_cells: 15
    reference_height: 0.2
    publish_global_path_topic: "/global_path"
    publish_pct_path_topic: "/pct_path"

tomogram_map_publisher:
  ros__parameters:
    pct_root: ""
    tomogram_path: ""
    map_frame: "map"
    mapground_topic: "/mapground"
    mapcloud_topic: "/mapcloud"
    publish_stride: 2
    ground_max_trav: 45.0
    obstacle_min_trav: 45.0
    publish_period: 2.0
